<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>California Road Trip — 18 Days</title>
<style>
  :root{ --bg:#070b1c; }
  html,body{margin:0;background:radial-gradient(120% 90% at 30% 10%, #0d1530 0%, #070b1c 55%, #04060f 100%);}
  .wrap{max-width:960px;margin:0 auto;padding:18px 14px 30px;}
  svg{width:100%;height:auto;display:block;border-radius:16px;
      box-shadow:0 30px 80px -30px rgba(0,0,0,.9), inset 0 0 0 1px rgba(120,140,190,.10);}
  .ml{font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;}
  text{font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;}
  .place{font-size:13.5px;font-weight:600;fill:#cdd8f2;letter-spacing:.3px;
         paint-order:stroke;stroke:#05080f;stroke-width:3px;stroke-linejoin:round;}
  .sub{font-size:10.5px;font-weight:600;fill:#8f9cc2;letter-spacing:.3px;
       paint-order:stroke;stroke:#05080f;stroke-width:3px;}
  .anchor-label{font-size:17px;font-weight:800;fill:#ffe2ab;letter-spacing:.6px;
         paint-order:stroke;stroke:#05080f;stroke-width:3.5px;}
  .park-label{fill:#dccdff;}
  .ghost{fill:#33406e;font-weight:800;letter-spacing:7px;}
  .title{fill:#f4ecd8;font-weight:800;letter-spacing:1.2px;}
  .tsub{fill:#9fb0d8;font-weight:600;letter-spacing:.6px;}
  .lg{fill:#c6d2ee;font-size:13px;font-weight:600;letter-spacing:.2px;}
  @media (prefers-reduced-motion: reduce){ #pulse{display:none;} }
</style>
<div class="wrap">
<svg viewBox="0 0 1000 1189" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Stylized map of an 18-day California road trip loop">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1736"/>
      <stop offset="1" stop-color="#070d22"/>
    </linearGradient>
    <radialGradient id="vig" cx="32%" cy="12%" r="95%">
      <stop offset="0" stop-color="#0e1733" stop-opacity="0"/>
      <stop offset="1" stop-color="#03050d" stop-opacity=".9"/>
    </radialGradient>
    <filter id="routeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- base -->
  <rect x="0" y="0" width="1000" height="1189" fill="#070b1c"/>
  <!-- ocean wedge (west of the coast) -->
  <path d="M0,0 L150,250 L232,505 L246,575 L470,860 L300,1189 L0,1189 Z" fill="url(#ocean)" opacity="0.85"/>
  <!-- faint coastline -->
  <path d="M150,250 L232,505 L246,575 L470,860 L520,1189" fill="none" stroke="#23407a" stroke-opacity=".5" stroke-width="2"/>

  <!-- faint graticule -->
  <g stroke="#5e6f9e" stroke-opacity="0.06" stroke-width="1">
    <line x1="250" y1="0" x2="250" y2="1189"/><line x1="450" y1="0" x2="450" y2="1189"/>
    <line x1="650" y1="0" x2="650" y2="1189"/><line x1="850" y1="0" x2="850" y2="1189"/>
    <line x1="0" y1="300" x2="1000" y2="300"/><line x1="0" y1="550" x2="1000" y2="550"/>
    <line x1="0" y1="800" x2="1000" y2="800"/><line x1="0" y1="1050" x2="1000" y2="1050"/>
  </g>

  <!-- ghost labels -->
  <text class="ghost ml" x="300" y="800" font-size="33" transform="rotate(-56 300 800)" opacity=".55">PACIFIC COAST</text>
  <text class="ghost ml" x="918" y="770" font-size="25" transform="rotate(-90 918 770)" opacity=".6">HIGHWAY 395</text>
  <text class="ghost ml" x="438" y="470" font-size="22" text-anchor="middle" opacity=".42">SIERRA NEVADA</text>
  <text class="ghost ml" x="565" y="715" font-size="18" text-anchor="middle" opacity=".38">CENTRAL VALLEY</text>

  <!-- ROUTE -->
  <path id="route" fill="none" stroke-linejoin="round" stroke-linecap="round"
    d="M142.6,259.4 L231.1,504.3 L226.3,513.7 L229.9,552.0 L245.7,573.0 L601.5,958.6 L846.7,1035.4 L877.3,503.1 L821.2,345.2 L743.4,297.8 L723.9,285.8 L713.8,217.0 L610.3,352.7 L725.5,475.0 L761.1,508.2 L142.6,259.4 Z"
    stroke="#e9a040" stroke-width="3.4" opacity=".95" filter="url(#routeGlow)"/>
  <path fill="none" stroke="#ffd79a" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" opacity=".9"
    d="M142.6,259.4 L231.1,504.3 L226.3,513.7 L229.9,552.0 L245.7,573.0 L601.5,958.6 L846.7,1035.4 L877.3,503.1 L821.2,345.2 L743.4,297.8 L723.9,285.8 L713.8,217.0 L610.3,352.7 L725.5,475.0 L761.1,508.2 L142.6,259.4 Z"/>

  <!-- travelling light -->
  <circle id="pulse" r="4.6" fill="#fff4dc" filter="url(#dotGlow)">
    <animateMotion dur="16s" repeatCount="indefinite" rotate="auto" calcMode="linear">
      <mpath xlink:href="#route"/>
    </animateMotion>
  </circle>

  <!-- NODES -->
  <!-- coast -->
  <g>
    <circle cx="231.1" cy="504.3" r="5" fill="#56e0c4" filter="url(#dotGlow)"/>
    <circle cx="226.3" cy="513.7" r="5" fill="#56e0c4" filter="url(#dotGlow)"/>
    <circle cx="229.9" cy="552.0" r="5" fill="#56e0c4" filter="url(#dotGlow)"/>
    <circle cx="245.7" cy="573.0" r="5" fill="#56e0c4" filter="url(#dotGlow)"/>
    <circle cx="601.5" cy="958.6" r="5" fill="#56e0c4" filter="url(#dotGlow)"/>
  </g>
  <!-- sierra -->
  <g>
    <circle cx="877.3" cy="503.1" r="5" fill="#93e05a" filter="url(#dotGlow)"/>
    <circle cx="821.2" cy="345.2" r="5" fill="#93e05a" filter="url(#dotGlow)"/>
    <circle cx="743.4" cy="297.8" r="5" fill="#93e05a" filter="url(#dotGlow)"/>
    <circle cx="723.9" cy="285.8" r="5" fill="#93e05a" filter="url(#dotGlow)"/>
    <circle cx="713.8" cy="217.0" r="5" fill="#93e05a" filter="url(#dotGlow)"/>
  </g>
  <!-- parks -->
  <g>
    <circle cx="610.3" cy="352.7" r="6" fill="#b9a3ff" filter="url(#dotGlow)"/>
    <circle cx="725.5" cy="475.0" r="6" fill="#b9a3ff" filter="url(#dotGlow)"/>
    <circle cx="761.1" cy="508.2" r="6" fill="#b9a3ff" filter="url(#dotGlow)"/>
  </g>
  <!-- anchors -->
  <g>
    <circle cx="142.6" cy="259.4" r="9" fill="#ffcb6b" filter="url(#dotGlow)"/>
    <circle cx="142.6" cy="259.4" r="3.4" fill="#3a2706"/>
    <circle cx="846.7" cy="1035.4" r="9" fill="#ffcb6b" filter="url(#dotGlow)"/>
    <circle cx="846.7" cy="1035.4" r="3.4" fill="#3a2706"/>
  </g>

  <!-- LABELS -->
  <text class="anchor-label" x="158" y="250" text-anchor="start">SAN FRANCISCO</text>
  <text class="anchor-label" x="831" y="1041" text-anchor="end">LOS ANGELES</text>

  <text class="place" x="219" y="501" text-anchor="end">Monterey</text>
  <text class="place" x="214" y="527" text-anchor="end">Carmel</text>
  <text class="place" x="218" y="558" text-anchor="end">Bixby Bridge</text>
  <text class="place" x="234" y="591" text-anchor="end">Big Sur</text>
  <text class="place" x="588" y="954" text-anchor="end">Santa Barbara</text>

  <text class="place" x="890" y="507" text-anchor="start">Lone Pine</text>
  <text class="place" x="834" y="349" text-anchor="start">Bishop</text>
  <text class="place" x="755" y="312" text-anchor="start">Convict Lake</text>
  <text class="place" x="712" y="282" text-anchor="end">Mammoth Lakes</text>
  <text class="place" x="726" y="214" text-anchor="start">Mono Lake</text>

  <text class="place park-label" x="598" y="349" text-anchor="end">Oakhurst</text>
  <text class="sub" x="598" y="364" text-anchor="end">Yosemite day tour</text>
  <text class="place park-label" x="738" y="473" text-anchor="start">Kings Canyon</text>
  <text class="place park-label" x="774" y="520" text-anchor="start">Sequoia</text>

  <!-- TITLE -->
  <text class="title ml" x="70" y="74" font-size="30">CALIFORNIA ROAD TRIP</text>
  <text class="tsub ml" x="71" y="104" font-size="14.5">18-day San Francisco loop · Coast · Eastern Sierra · Yosemite · Sequoia</text>
  <text class="tsub ml" x="71" y="126" font-size="12.5" fill="#7f8fbb">≈ 1,500 miles · 18 Aug – 5 Sep</text>

  <!-- LEGEND -->
  <g>
    <rect x="58" y="1000" width="292" height="176" rx="14" fill="rgba(9,14,30,.72)" stroke="rgba(120,140,190,.22)"/>
    <text class="ml" x="80" y="1030" font-size="11" letter-spacing="3" fill="#8694bd">LEGEND</text>
    <circle cx="86" cy="1056" r="6.5" fill="#ffcb6b"/><text class="lg" x="104" y="1061">Start / end — SF &amp; LA</text>
    <circle cx="86" cy="1086" r="5.5" fill="#56e0c4"/><text class="lg" x="104" y="1091">Pacific Coast Highway</text>
    <circle cx="86" cy="1116" r="5.5" fill="#93e05a"/><text class="lg" x="104" y="1121">Eastern Sierra · Hwy 395</text>
    <circle cx="86" cy="1146" r="6" fill="#b9a3ff"/><text class="lg" x="104" y="1151">Yosemite &amp; Sequoia</text>
  </g>

  <rect x="0" y="0" width="1000" height="1189" fill="url(#vig)" pointer-events="none"/>
</svg>
</div>
